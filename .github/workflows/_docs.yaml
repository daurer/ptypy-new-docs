name: Documentation

on:
  workflow_call:

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout/@v4
    - uses: ammaraskar/sphinx-action@8.1.3
      with:
        docs-folder: docs/
    - uses: actions/upload-artifact@v4.4.3
      with:
        name: new-docs
        path: site